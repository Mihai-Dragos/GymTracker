<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress - Basic-Fit Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-12 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
        <h1 class="text-lg md:text-xl font-bold tracking-wide">Your Progress</h1>
      </div>
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-1 bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">
          <i data-lucide="arrow-left" class="w-4 h-4 text-white"></i>
          <span class="hidden sm:inline text-white">Back to Tracker</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto p-4 md:mt-4 space-y-6">
    <div id="loading-indicator" class="flex items-center justify-center h-64">
      <div class="animate-pulse flex flex-col items-center">
        <i data-lucide="bar-chart" class="w-12 h-12 text-blue-500 mb-4"></i>
        <h2 class="text-xl font-bold text-gray-700">Loading Data...</h2>
      </div>
    </div>

    <div id="charts-container" class="hidden space-y-6">
      <!-- Chest Press Chart -->
      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="font-bold text-gray-800 mb-4 text-lg">Max Weight: Chest Press</h2>
        <canvas id="chestPressChart"></canvas>
      </div>

      <!-- Leg Press Chart -->
      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="font-bold text-gray-800 mb-4 text-lg">Max Weight: Leg Press</h2>
        <canvas id="legPressChart"></canvas>
      </div>

      <!-- Shoulder Press Chart -->
      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="font-bold text-gray-800 mb-4 text-lg">Max Weight: Shoulder Press</h2>
        <canvas id="shoulderPressChart"></canvas>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE INITIALIZATION ---
    const fallbackConfig = {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'basic-fit-tracker';
    const LOCAL_STORAGE_KEY = 'basicFitTrackerData';

    let app, auth, db;
    let isFirebaseConfigured = false;
    
    // Keep track of charts to destroy old ones if data updates
    // Moved to the top to prevent initialization ReferenceErrors
    const chartInstances = {};

    if (firebaseConfig && firebaseConfig.apiKey) {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      isFirebaseConfigured = true;
    }

    async function initAuth() {
      if (!isFirebaseConfigured) {
        loadLocalDataAndRender();
        return;
      }
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth Error:", err);
      }
    }

    if (isFirebaseConfigured) {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const weeksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'weeks');
          onSnapshot(weeksRef, (snapshot) => {
            const data = {};
            snapshot.forEach(doc => { data[doc.id] = doc.data(); });
            renderCharts(data);
          });
        }
      });
    }

    initAuth();
    lucide.createIcons();

    function loadLocalDataAndRender() {
      let savedData = {};
      const storedData = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (storedData) {
        try {
          savedData = JSON.parse(storedData);
        } catch(e) {}
      }
      renderCharts(savedData);
    }

    function extractMaxWeight(data, week, workoutKey, supersetIndex, exerciseIndex) {
      let maxWeight = 0;
      const exercise = data[week]?.workouts[workoutKey]?.supersets[supersetIndex]?.exercises[exerciseIndex];
      if (exercise && exercise.sets) {
        exercise.sets.forEach(set => {
          const weight = parseFloat(set.w);
          if (!isNaN(weight) && weight > maxWeight) {
            maxWeight = weight;
          }
        });
      }
      return maxWeight;
    }

    function renderCharts(data) {
      document.getElementById('loading-indicator').classList.add('hidden');
      document.getElementById('charts-container').classList.remove('hidden');

      // Sort dates chronologically (oldest to newest)
      const sortedWeeks = Object.keys(data).sort();

      const labels = sortedWeeks;
      
      // Workout 1, Superset 1, Exercise 1: Chest Press
      const chestPressData = sortedWeeks.map(w => extractMaxWeight(data, w, 'w1', 0, 0));
      // Workout 2, Superset 1, Exercise 1: Leg Press
      const legPressData = sortedWeeks.map(w => extractMaxWeight(data, w, 'w2', 0, 0));
      // Workout 3, Superset 1, Exercise 1: Shoulder Press
      const shoulderPressData = sortedWeeks.map(w => extractMaxWeight(data, w, 'w3', 0, 0));

      createChart('chestPressChart', 'Chest Press (kg)', labels, chestPressData, 'rgb(59, 130, 246)');
      createChart('legPressChart', 'Leg Press (kg)', labels, legPressData, 'rgb(16, 185, 129)');
      createChart('shoulderPressChart', 'Shoulder Press (kg)', labels, shoulderPressData, 'rgb(245, 158, 11)');
    }

    function createChart(canvasId, label, labels, dataPoints, color) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      
      if (chartInstances[canvasId]) {
        chartInstances[canvasId].destroy();
      }

      chartInstances[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: label,
            data: dataPoints,
            borderColor: color,
            backgroundColor: color.replace(')', ', 0.1)').replace('rgb', 'rgba'),
            borderWidth: 2,
            pointBackgroundColor: color,
            pointRadius: 4,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.parsed.y + ' kg';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: 'Weight (kg)'
              }
            },
            x: {
              title: {
                display: true,
                text: 'Week Of'
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
